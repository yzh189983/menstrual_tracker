<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总日历 - 📚 日历记录小助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f9f0ff 0%, #faf5ff 50%, #f9f0ff 100%);
            min-height: 100vh;
            padding: 20px;
            padding-top: 120px;
        }

        /* 可伸缩导航栏 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(135deg, #9b59b6 0%, #c39bd3 100%);
            box-shadow: 0 4px 20px rgba(155, 89, 182, 0.4);
            transition: all 0.3s ease;
            border-radius: 0 0 25px 25px;
        }

        .header.collapsed {
            transform: translateY(-100%);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }

        .toggle-btn {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #9b59b6 0%, #c39bd3 100%);
            color: white;
            border: none;
            width: 40px;
            height: 20px;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 始终显示的展开按钮 - 手机端专用 */
        .expand-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 99;
            background: linear-gradient(135deg, #9b59b6 0%, #c39bd3 100%);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
            transition: all 0.3s;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .expand-btn.show {
            display: flex;
        }

        .expand-btn:hover {
            transform: scale(1.1);
        }

        .toggle-btn::before {
            content: '▲';
        }

        .header.collapsed .toggle-btn::before {
            content: '▼';
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            padding: 0 30px 15px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 8px 18px;
            border-radius: 15px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
            font-weight: 500;
            font-size: 0.9em;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .nav-tab.active {
            background: white;
            color: #9b59b6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            box-shadow: 0 10px 30px rgba(155, 89, 182, 0.2);
            margin-bottom: 25px;
;
            justify-content: space-between;
            display: flex            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 35px;
        }

        .header h1 {
            color: #9b59b6;
            font-size: 1.5em;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            padding: 10px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: #d2b4de;
            background: #f5eef8;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-tab:hover {
            background: #9b59b6;
            color: white;
        }

        .nav-tab.active {
            background: #9b59b6;
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            background: #f5eef8;
            color: #9b59b6;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .btn-logout:hover {
            background: #9b59b6;
            color: white;
        }

        .legend-card {
            background: white;
            border-radius: 25px;
            padding: 20px 25px;
            box-shadow: 0 10px 30px rgba(155, 89, 182, 0.2);
            margin-bottom: 25px;
        }

        .legend-card h3 {
            color: #9b59b6;
            margin-bottom: 15px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .legend-dot.period { background: #ff6b9d; }
        .legend-dot.study { background: #1890ff; }
        .legend-dot.work { background: #fa8c16; }

        .calendar-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(155, 89, 182, 0.2);
        }

        .calendar-card h2 {
            color: #9b59b6;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .decoration {
            position: fixed;
            font-size: 40px;
            opacity: 0.15;
            pointer-events: none;
        }
        .dec1 { top: 10%; left: 10%; }
        .dec2 { top: 20%; right: 10%; }
        .dec3 { bottom: 15%; left: 15%; }
        .dec4 { bottom: 25%; right: 15%; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stat-card.period { border-top: 4px solid #ff6b9d; }
        .stat-card.study { border-top: 4px solid #1890ff; }
        .stat-card.work { border-top: 4px solid #fa8c16; }

        .stat-card h4 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .stat-num {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-card.period .stat-num { color: #ff6b9d; }
        .stat-card.study .stat-num { color: #1890ff; }
        .stat-card.work .stat-num { color: #fa8c16; }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 95%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-header h3 {
            color: #9b59b6;
            font-size: 1.3em;
        }

        .modal-close {
            background: #f5f5f5;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #ff6b9d;
            color: white;
        }

        .modal-body {
            color: #333;
        }

        /* 两栏布局 */
        .modal-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 600px) {
            .modal-columns {
                grid-template-columns: 1fr;
            }
        }

        .detail-column {
            padding: 15px;
            border-radius: 15px;
        }

        .detail-column.left {
            background: #f9f0ff;
        }

        .detail-column.right {
            background: #f0f9ff;
        }

        .detail-column h4 {
            color: #9b59b6;
            font-size: 1em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-column.right h4 {
            color: #1890ff;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #999;
            font-weight: 500;
            font-size: 0.9em;
        }

        .detail-value {
            color: #333;
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .detail-value.period { color: #ff6b9d; }
        .detail-value.study { color: #1890ff; }
        .detail-value.work { color: #fa8c16; }

        .modal-type-icon {
            font-size: 2em;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="decoration dec1">📅</div>
    <div class="decoration dec2">🌸</div>
    <div class="decoration dec3">📚</div>
    <div class="decoration dec4">💼</div>

    <div class="container">
        <!-- 可伸缩导航栏 -->
        <div class="header" id="header">
            <div class="header-top">
                <div class="header-left">
                    <span class="logo">📅</span>
                    <h1>总日历</h1>
                </div>
                <div class="user-info">
                    <a href="{{ url_for('profile') }}" style="text-decoration: none;">
                        <button class="btn-logout">👤 个人信息</button>
                    </a>
                    <a href="{{ url_for('logout') }}"><button class="btn-logout">登出</button></a>
                </div>
            </div>
            <div class="nav-tabs">
                <a href="{{ url_for('index') }}" class="nav-tab">🌸 月经记录</a>
                <a href="{{ url_for('study') }}" class="nav-tab">📚 学习记录</a>
                <a href="{{ url_for('work') }}" class="nav-tab">💼 工作记录</a>
                <a href="{{ url_for('all_calendar') }}" class="nav-tab {% if request.endpoint == 'all_calendar' %}active{% endif %}">📅 总日历</a>
                <a href="{{ url_for('chat') }}" class="nav-tab {% if request.endpoint == 'chat' or 'chat_room' in request.endpoint %}active{% endif %}">💬 消息</a>
                <a href="{{ url_for('feedback') }}" class="nav-tab">💭 反馈</a>
            </div>
            <button class="toggle-btn" onclick="toggleHeader()"></button>
        </div>

        <!-- 手机端展开按钮 -->
        <button class="expand-btn show" id="expandBtn" onclick="toggleHeader()">☰</button>

        <div class="legend-card">
            <h3>🎨 图例说明</h3>
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-dot period"></span>
                    <span>月经记录</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot study"></span>
                    <span>学习记录</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot work"></span>
                    <span>工作记录</span>
                </div>
            </div>
        </div>

        <div class="calendar-card">
            <h2>📅 所有记录</h2>
            <div id="calendar"></div>
        </div>

        <div class="stats-row">
            <div class="stat-card period">
                <h4>🌸 月经记录</h4>
                <div class="stat-num">{{ periods|length }}</div>
                <div style="color: #999; font-size: 0.8em;">条记录</div>
            </div>
            <div class="stat-card study">
                <h4>📚 学习记录</h4>
                <div class="stat-num">{{ study_records|length }}</div>
                <div style="color: #999; font-size: 0.8em;">条记录</div>
            </div>
            <div class="stat-card work">
                <h4>💼 工作记录</h4>
                <div class="stat-num">{{ work_records|length }}</div>
                <div style="color: #999; font-size: 0.8em;">条记录</div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 记录详情</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="modal-type-icon" id="modalIcon"></div>
                <div id="modalDetails"></div>
            </div>
        </div>
    </div>

    <script>
        // 月经记录详细信息
        const periodDetails = {
            {% for period in periods %}
            'period_{{ period.id }}': {
                type: 'period',
                icon: '🌸',
                start_date: '{{ period.start_date }}',
                end_date: '{{ period.end_date }}',
                days: {{ (period.end_date - period.start_date).days + 1 }},
                flow: '{{ period.flow }}',
                flowText: '{% if period.flow == "light" %}少量{% elif period.flow == "medium" %}中等{% else %}大量{% endif %}',
                notes: '{{ period.notes if period.notes else "无" }}'
            },
            {% endfor %}
        };

        // 学习记录详细信息
        const studyDetails = {
            {% for record in study_records %}
            'study_{{ record.id }}': {
                type: 'study',
                icon: '📚',
                date: '{{ record.date }}',
                subject: '{{ record.subject }}',
                duration: '{{ record.duration }}',
                content: '{{ record.plan if record.plan else (record.notes if record.notes else "无") }}'
            },
            {% endfor %}
        };

        // 工作记录详细信息
        const workDetails = {
            {% for record in work_records %}
            'work_{{ record.id }}': {
                type: 'work',
                icon: '💼',
                date: '{{ record.date }}',
                task: '{{ record.task }}',
                hours: '{% if record.task_duration %}{{ (record.task_duration / 60)|round(1) }}{% else %}0{% endif %}',
                description: '{{ record.notes if record.notes else "无" }}'
            },
            {% endfor %}
        };

        // 月经记录（事件数据）
        const periodData = [
            {% for period in periods %}
            {
                id: 'period_{{ period.id }}',
                title: '🌸 经期 ({{ ((period.end_date - period.start_date).days + 1) }}天)',
                start: '{{ period.start_date }}',
                end: '{{ (period.end_date + timedelta(days=1)) }}',
                backgroundColor: '#ff6b9d',
                borderColor: '#ff6b9d',
                type: 'period'
            },
            {% endfor %}
        ];

        // 学习记录
        const studyData = [
            {% for record in study_records %}
            {
                id: 'study_{{ record.id }}',
                title: '📚 {{ record.subject }} ({{ record.duration }}分钟)',
                start: '{{ record.date }}',
                backgroundColor: '#1890ff',
                borderColor: '#1890ff',
                type: 'study'
            },
            {% endfor %}
        ];

        // 工作记录
        const workData = [
            {% for record in work_records %}
            {
                id: 'work_{{ record.id }}',
                title: '💼 {% if record.task %}{{ record.task }}{% endif %} ({% if record.task_duration %}{{ (record.task_duration / 60)|round(1) }}{% else %}0{% endif %}小时)',
                start: '{{ record.date }}',
                backgroundColor: '#fa8c16',
                borderColor: '#fa8c16',
                type: 'work'
            },
            {% endfor %}
        ];

        // 合并所有事件
        const allEvents = [...periodData, ...studyData, ...workData];

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listWeek'
                },
                events: allEvents,
                eventDisplay: 'block',
                height: 'auto',
                locale: 'zh-cn',
                buttonText: {
                    today: '今天',
                    month: '月',
                    list: '列表'
                },
                eventClick: function(info) {
                    showDetail(info.event.id);
                }
            });
            calendar.render();
        });

        // 显示详情弹窗
        function showDetail(eventId) {
            const modal = document.getElementById('detailModal');
            const modalIcon = document.getElementById('modalIcon');
            const modalDetails = document.getElementById('modalDetails');
            
            let detail = null;
            let type = '';
            
            // 查找记录类型和详情
            if (periodDetails[eventId]) {
                detail = periodDetails[eventId];
                type = 'period';
            } else if (studyDetails[eventId]) {
                detail = studyDetails[eventId];
                type = 'study';
            } else if (workDetails[eventId]) {
                detail = workDetails[eventId];
                type = 'work';
            }
            
            if (!detail) return;
            
            // 设置图标
            modalIcon.textContent = detail.icon;
            
            // 根据类型显示不同内容
            let html = '';
            if (type === 'period') {
                html = `
                    <div class="modal-columns">
                        <div class="detail-column left">
                            <h4>📋 记录详情</h4>
                            <div class="detail-item">
                                <span class="detail-label">📅 开始日期</span>
                                <span class="detail-value period">${detail.start_date}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📅 结束日期</span>
                                <span class="detail-value period">${detail.end_date}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">⏱️ 持续天数</span>
                                <span class="detail-value period">${detail.days} 天</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">💧 经量</span>
                                <span class="detail-value period">${detail.flowText}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📝 备注</span>
                                <span class="detail-value">${detail.notes}</span>
                            </div>
                        </div>
                        <div class="detail-column right">
                            <h4>📊 统计信息</h4>
                            <div class="detail-item">
                                <span class="detail-label">📅 本次经期</span>
                                <span class="detail-value period">${detail.days} 天</span>
                            </div>
                        </div>
                    </div>
                `;
            } else if (type === 'study') {
                // 计算统计信息
                const today = new Date().toISOString().split('T')[0];
                const thisMonth = today.substring(0, 7);
                
                // 今日学习时长
                let todayDuration = 0;
                // 累计学习时长
                let totalDuration = 0;
                // 本月学习时长
                let monthDuration = 0;
                
                Object.values(studyDetails).forEach(s => {
                    const dur = parseInt(s.duration) || 0;
                    totalDuration += dur;
                    if (s.date === today) todayDuration += dur;
                    if (s.date.startsWith(thisMonth)) monthDuration += dur;
                });
                
                html = `
                    <div class="modal-columns">
                        <div class="detail-column left">
                            <h4>📋 记录详情</h4>
                            <div class="detail-item">
                                <span class="detail-label">📅 日期</span>
                                <span class="detail-value study">${detail.date}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📚 科目</span>
                                <span class="detail-value study">${detail.subject}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">⏱️ 时长</span>
                                <span class="detail-value study">${detail.duration} 分钟</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📝 内容</span>
                                <span class="detail-value">${detail.content}</span>
                            </div>
                        </div>
                        <div class="detail-column right">
                            <h4>📊 统计信息</h4>
                            <div class="detail-item">
                                <span class="detail-label">🎯 今日目标</span>
                                <span class="detail-value study">${detail.subject}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">⏰ 今日学习</span>
                                <span class="detail-value study">${todayDuration} 分钟</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📈 本月学习</span>
                                <span class="detail-value study">${monthDuration} 分钟</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📚 累计学习</span>
                                <span class="detail-value study">${totalDuration} 分钟</span>
                            </div>
                        </div>
                    </div>
                `;
            } else if (type === 'work') {
                // 计算统计信息
                const today = new Date().toISOString().split('T')[0];
                const thisMonth = today.substring(0, 7);
                
                // 今日工作时长
                let todayHours = 0;
                // 累计工作时长
                let totalHours = 0;
                // 本月工作时长
                let monthHours = 0;
                
                Object.values(workDetails).forEach(w => {
                    const hrs = parseFloat(w.hours) || 0;
                    totalHours += hrs;
                    if (w.date === today) todayHours += hrs;
                    if (w.date.startsWith(thisMonth)) monthHours += hrs;
                });
                
                html = `
                    <div class="modal-columns">
                        <div class="detail-column left">
                            <h4>📋 记录详情</h4>
                            <div class="detail-item">
                                <span class="detail-label">📅 日期</span>
                                <span class="detail-value work">${detail.date}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">💼 任务</span>
                                <span class="detail-value work">${detail.task}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">⏱️ 时长</span>
                                <span class="detail-value work">${detail.hours} 小时</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📝 描述</span>
                                <span class="detail-value">${detail.description}</span>
                            </div>
                        </div>
                        <div class="detail-column right">
                            <h4>📊 统计信息</h4>
                            <div class="detail-item">
                                <span class="detail-label">💼 本月工作</span>
                                <span class="detail-value work">${monthHours.toFixed(1)} 小时</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">⏰ 今日工作</span>
                                <span class="detail-value work">${todayHours.toFixed(1)} 小时</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">📈 累计工作</span>
                                <span class="detail-value work">${totalHours.toFixed(1)} 小时</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            modalDetails.innerHTML = html;
            modal.classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 点击弹窗外部关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ESC键关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 导航栏伸缩功能
        let headerCollapsed = false;
        
        function toggleHeader() {
            const header = document.getElementById('header');
            headerCollapsed = !headerCollapsed;
            
            if (headerCollapsed) {
                header.classList.add('collapsed');
                document.body.style.paddingTop = '20px';
                document.getElementById('expandBtn').classList.add('show');
            } else {
                header.classList.remove('collapsed');
                document.body.style.paddingTop = '120px';
                document.getElementById('expandBtn').classList.remove('show');
            }
            
            localStorage.setItem('headerCollapsed', headerCollapsed);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const savedState = localStorage.getItem('headerCollapsed');
            if (savedState === 'true') {
                const header = document.getElementById('header');
                header.classList.add('collapsed');
                document.body.style.paddingTop = '20px';
                headerCollapsed = true;
                document.getElementById('expandBtn').classList.add('show');
            }
        });
    </script>
</body>
</html>
