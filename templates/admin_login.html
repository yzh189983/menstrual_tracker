<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 📚 日历记录小助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .login-card .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #667eea;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 3px solid #e8ecff;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            width: 100%;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash {
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .flash-success {
            background: #f6ffed;
            color: #52c41a;
        }

        .flash-error {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .decoration {
            position: fixed;
            font-size: 60px;
            opacity: 0.1;
            pointer-events: none;
        }
        .dec1 { top: 10%; left: 5%; }
        .dec2 { top: 30%; right: 5%; }
        .dec3 { bottom: 20%; left: 10%; }
        .dec4 { bottom: 40%; right: 10%; }
    </style>
</head>
<body>
    <div class="decoration dec1">🔐</div>
    <div class="decoration dec2">⚙️</div>
    <div class="decoration dec3">📊</div>
    <div class="decoration dec4">👑</div>

    <div class="login-card">
        <h1>👑 管理员登录</h1>
        <p class="subtitle">日历记录小助手后台管理系统</p>

        <!-- 消息提示 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>👤 用户名</label>
                <input type="text" name="username" placeholder="请输入管理员用户名" required>
            </div>
            
            <div class="form-group">
                <label>🔑 密码</label>
                <input type="password" name="password" placeholder="请输入管理员密码" required>
            </div>
            
            <button type="submit" class="btn-submit">🚀 登录</button>
        </form>

        <a href="{{ url_for('login') }}" class="back-link">← 返回用户登录</a>
    </div>
</body>
</html>
