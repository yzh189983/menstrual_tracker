<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 🌸 日历记录小助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #ffe6f3 0%, #fff0f6 50%, #ffe6f3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 {
            color: #ff6b9d;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ff8fab;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #ff6b9d;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 3px solid #ffe6f3;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.3);
        }

        .btn-submit {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.4);
        }

        .link {
            margin-top: 20px;
            color: #ff8fab;
        }

        .link a {
            color: #ff6b9d;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .error {
            background: #ffe6e6;
            color: #ff4444;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* 装饰 */
        .decoration {
            position: fixed;
            font-size: 40px;
            opacity: 0.2;
            pointer-events: none;
        }
        .dec1 { top: 10%; left: 10%; }
        .dec2 { top: 20%; right: 10%; }
        .dec3 { bottom: 15%; left: 15%; }
        .dec4 { bottom: 25%; right: 15%; }
    </style>
</head>
<body>
    <div class="decoration dec1">🌸</div>
    <div class="decoration dec2">🌺</div>
    <div class="decoration dec3">🌷</div>
    <div class="decoration dec4">🌹</div>

    <div class="login-container">
        <div class="logo">🌸</div>
        <h1>日历记录小助手</h1>
        <p class="subtitle">欢迎回来～ 💕</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>👤 用户名</label>
                <input type="text" name="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>🔑 密码</label>
                <input type="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn-submit">💖 登录</button>
        </form>

        <p class="link"><a href="{{ url_for('forgot_password') }}">忘记密码？</a></p>
        <p class="link">还没有账号？ <a href="{{ url_for('register') }}">点击注册</a></p>
    </div>
</body>
</html>
